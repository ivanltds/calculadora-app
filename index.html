<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e0533">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="keypad">
                <button class="btn clear" id="clear">AC</button>
                <button class="btn delete" id="delete">DEL</button>
                <button class="btn operator" data-action="divide">÷</button>
                <button class="btn operator" data-action="multiply">×</button>
                
                <button class="btn number">7</button>
                <button class="btn number">8</button>
                <button class="btn number">9</button>
                <button class="btn operator" data-action="subtract">−</button>
                
                <button class="btn number">4</button>
                <button class="btn number">5</button>
                <button class="btn number">6</button>
                <button class="btn operator" data-action="add">+</button>
                
                <button class="btn number">1</button>
                <button class="btn number">2</button>
                <button class="btn number">3</button>
                <button class="btn equals" id="equals" rowspan="2">=</button>
                
                <button class="btn number zero">0</button>
                <button class="btn number decimal">.</button>
                <button class="btn install-btn" id="install-btn" style="display: none;">Instalar App</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
